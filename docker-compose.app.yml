services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - ./:/app
      - go-mod-cache:/go/pkg/mod
    environment:
      GO_ENV: development
    tty: true
    stdin_open: true
    networks:
      - app-network

  app-debug:
    extends: app
    profiles: ["debug"]
    ports:
      - "8080:8080"
      - "2345:2345"
    command: ["air", "-c", "air.debug.toml"]

  app-run:
    extends: app
    profiles: ["run"]
    ports:
      - "8080:8080"
    command: ["air", "-c", "air.run.toml"]

volumes:
  go-mod-cache:

networks:
  app-network:
    driver: bridge
